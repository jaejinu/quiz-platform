spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/quizdb
    username: quiz
    password: quiz
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: quiz
    password: quiz
    virtual-host: /
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:dummy-local-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:dummy-local-client-secret}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

quiz:
  websocket:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
    endpoint: /ws
  instance:
    id: ${QUIZ_INSTANCE_ID:}
  score:
    max: 1000
  security:
    jwt:
      secret: dev-local-secret-min-32-bytes-xxxxxxxxxx
      access-token-ttl: 1h
      issuer: quiz-platform
  auth:
    post-login-redirect: http://localhost:5173/auth/callback
