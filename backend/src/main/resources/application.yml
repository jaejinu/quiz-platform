spring:
  application:
    name: quiz-platform
  profiles:
    active: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: read:user,user:email
  rabbitmq:
    template:
      observation-enabled: true
    listener:
      simple:
        observation-enabled: true

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
      transport: http
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        quiz.answer.processing.duration: true
        quiz.redis.pubsub.latency: true
        quiz.game.advance.duration: true
      percentiles:
        quiz.answer.processing.duration: 0.5,0.95,0.99
        quiz.redis.pubsub.latency: 0.5,0.95,0.99
        quiz.game.advance.duration: 0.5,0.95
      slo:
        quiz.answer.processing.duration: 100ms,300ms,500ms
  prometheus:
    metrics:
      export:
        enabled: true

quiz:
  websocket:
    allowed-origins: []
    endpoint: /ws
  instance:
    id: ${QUIZ_INSTANCE_ID:}
  security:
    jwt:
      secret: ${QUIZ_JWT_SECRET:dev-local-secret-min-32-bytes-xxxxxxxxxx}
      access-token-ttl: 1h
      issuer: quiz-platform
  auth:
    post-login-redirect: ${QUIZ_AUTH_POST_LOGIN_REDIRECT:http://localhost:5173/auth/callback}

logging:
  level:
    root: INFO
    com.quiz: DEBUG
    org.springframework.web.socket: INFO
