spring:
  application:
    name: quiz-platform
  profiles:
    active: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        quiz.answer.processing.duration: true
        quiz.redis.pubsub.latency: true
        quiz.game.advance.duration: true
      percentiles:
        quiz.answer.processing.duration: 0.5,0.95,0.99
        quiz.redis.pubsub.latency: 0.5,0.95,0.99
        quiz.game.advance.duration: 0.5,0.95
      slo:
        quiz.answer.processing.duration: 100ms,300ms,500ms
  prometheus:
    metrics:
      export:
        enabled: true

quiz:
  websocket:
    allowed-origins: []
    endpoint: /ws
  instance:
    id: ${QUIZ_INSTANCE_ID:}
  security:
    jwt:
      secret: ${QUIZ_JWT_SECRET:dev-local-secret-min-32-bytes-xxxxxxxxxx}
      access-token-ttl: 1h
      issuer: quiz-platform

logging:
  level:
    root: INFO
    com.quiz: DEBUG
    org.springframework.web.socket: INFO
