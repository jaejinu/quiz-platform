spring:
  # OAuth2 client autoconfigure 제외는 SecurityConfig의 .oauth2Login()이 요구하는
  # ClientRegistrationRepository 빈까지 사라져 context 로딩이 깨진다.
  # 대안: dummy GitHub registration을 주입해 빈만 존재시키고, 실제 OAuth 플로우는
  # 테스트에서 호출되지 않으므로 무해.
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: read:user,user:email
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  tracing:
    enabled: false
  otlp:
    tracing:
      export:
        enabled: false

quiz:
  websocket:
    allowed-origins:
      - "*"
    endpoint: /ws
  instance:
    id: ${QUIZ_INSTANCE_ID:test-instance-1}
  score:
    max: 1000
  security:
    jwt:
      secret: test-secret-min-32-bytes-xxxxxxxxxx
      access-token-ttl: 1h
      refresh-token-ttl: 14d
      issuer: quiz-platform-test

logging:
  level:
    root: WARN
    com.quiz: INFO
    org.springframework.web.socket: WARN
    org.hibernate: WARN
