spring:
  # OAuth2 client autoconfigureлҠ” GitHub registrationмқҳ л№Ҳ client-idм—җ мҳҲмҷёлҘј лҚҳм§„лӢӨ (Spring Boot 3.3).
  # н…ҢмҠӨнҠёлҠ” Stub мқёмҰқл§Ң м“°лҜҖлЎң OAuth2 autoconfigure м „мІҙлҘј м ңмҷё.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.client.reactive.ReactiveOAuth2ClientAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  tracing:
    enabled: false
  otlp:
    tracing:
      export:
        enabled: false

quiz:
  websocket:
    allowed-origins:
      - "*"
    endpoint: /ws
  instance:
    id: ${QUIZ_INSTANCE_ID:test-instance-1}
  score:
    max: 1000
  security:
    jwt:
      secret: test-secret-min-32-bytes-xxxxxxxxxx
      access-token-ttl: 1h
      issuer: quiz-platform-test

logging:
  level:
    root: WARN
    com.quiz: INFO
    org.springframework.web.socket: WARN
    org.hibernate: WARN
