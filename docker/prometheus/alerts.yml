groups:
  - name: quiz-platform
    interval: 30s
    rules:
      - alert: HighAnswerLatency
        expr: histogram_quantile(0.95, sum by (le) (rate(quiz_answer_processing_duration_seconds_bucket[2m]))) > 0.5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Answer processing P95 > 500ms"
          description: "Current P95 is {{ $value }}s"

      - alert: RabbitQueueBacklog
        expr: quiz_rabbitmq_answers_queue_depth > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ quiz.answers queue backing up"

      - alert: AnswerErrorRate
        expr: rate(quiz_answers_processed_total{outcome="error"}[5m]) / clamp_min(rate(quiz_answers_processed_total[5m]), 0.01) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Answer error rate > 5%"

      - alert: PubSubLatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(quiz_redis_pubsub_latency_seconds_bucket[2m]))) > 0.2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Redis Pub/Sub P95 latency > 200ms"
