# 모니터링 스택 (Step 5에서 활용)
# 실행: docker compose -f docker-compose.yml -f docker-compose.monitor.yml up -d
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: quiz-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: quiz-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  tempo:
    image: grafana/tempo:2.5.0
    container_name: quiz-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "3200:3200"   # HTTP query
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:
