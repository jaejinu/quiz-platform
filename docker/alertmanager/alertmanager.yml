global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical

receivers:
  - name: default
    # Slack/Discord webhook 설정 예시 (프로덕션에서 활성화)
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#quiz-alerts'
    #     title: '{{ .CommonLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: critical
    # webhook_configs:
    #   - url: '${DISCORD_WEBHOOK_URL}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
