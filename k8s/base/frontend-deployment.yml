apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: quiz-platform
  labels:
    app: quiz-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quiz-frontend
  template:
    metadata:
      labels:
        app: quiz-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/jaejinu/quiz-platform-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: quiz-platform
spec:
  selector:
    app: quiz-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
