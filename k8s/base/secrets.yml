# 실제 배포 시 kubectl create secret 또는 External Secrets Operator 사용
# 이 파일은 구조 참조용 (실제 값은 커밋하지 않음)
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: quiz-platform
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: quiz
  SPRING_DATASOURCE_PASSWORD: CHANGE_ME
  SPRING_RABBITMQ_USERNAME: quiz
  SPRING_RABBITMQ_PASSWORD: CHANGE_ME
  QUIZ_JWT_SECRET: CHANGE_ME_MIN_32_BYTES
  GITHUB_CLIENT_ID: CHANGE_ME
  GITHUB_CLIENT_SECRET: CHANGE_ME
